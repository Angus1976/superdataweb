# Sealos 一键部署配置
# 包含：FastAPI 后端(含前端静态文件) + PostgreSQL + Redis
#
# 部署步骤：
# 1. 在 Sealos 控制台选择「应用管理」→「新建应用」→「Docker Compose」
# 2. 粘贴本文件内容，或上传本文件
# 3. 配置环境变量（参考 .env.sealos）
# 4. 点击部署

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.sealos
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-superinsight2024}@db:5432/superinsight
      - REDIS_URL=redis://cache:6379/0
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-3.5-turbo}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY:-}
      - BAIDU_PAN_APP_KEY=${BAIDU_PAN_APP_KEY:-}
      - BAIDU_PAN_SECRET_KEY=${BAIDU_PAN_SECRET_KEY:-}
      - BAIDU_PAN_REDIRECT_URI=${BAIDU_PAN_REDIRECT_URI:-}
      - BAIDU_PAN_APP_DIR=${BAIDU_PAN_APP_DIR:-/apps/SuperInsight}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-superinsight2024}
      - POSTGRES_DB=superinsight
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
