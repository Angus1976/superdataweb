# Standalone interview service with isolated postgres & redis instances
# Usage: docker compose -f docker-compose.standalone.yml up -d

services:
  interview-service:
    build:
      context: .
      dockerfile: Dockerfile.interview
    ports:
      - "8011:8001"
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    command: ["uvicorn", "src.interview.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@interview-postgres:5432/superinsight
      - REDIS_URL=redis://interview-redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - PROMETHEUS_ENABLED=true
      - BAIDU_PAN_APP_KEY=${BAIDU_PAN_APP_KEY:-}
      - BAIDU_PAN_SECRET_KEY=${BAIDU_PAN_SECRET_KEY:-}
      - BAIDU_PAN_REDIRECT_URI=${BAIDU_PAN_REDIRECT_URI:-http://localhost:8011/api/baidu-pan/callback}
      - BAIDU_PAN_APP_DIR=${BAIDU_PAN_APP_DIR:-/apps/SuperInsight}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-3.5-turbo}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY:-}
    depends_on:
      interview-postgres:
        condition: service_healthy
      interview-redis:
        condition: service_healthy
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/interview/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  interview-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=superinsight
    ports:
      - "5433:5432"
    volumes:
      - interview-pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - interview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  interview-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - interview-redisdata:/data
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  interview-pgdata:
  interview-redisdata:

networks:
  interview-network:
    driver: bridge
